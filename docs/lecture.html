<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>COMP6441 — Growing Neural Cellular Automata</title>
<meta name="description" content="One neural cellular automaton grows a whole string from seed cells. Wound it and it grows back.">
<link rel="stylesheet" href="lecture.css">
</head>
<body>

<main id="stage">
  <div id="paper">
    <canvas id="canvas" aria-label="A string growing from seed cells"></canvas>
  </div>
  <p id="error" hidden></p>
</main>

<div id="controls">
  <button id="play" class="primary">Play</button>
  <button id="reset">Reset</button>
  <button id="damage">Damage</button>

  <label class="speed">
    <span>speed</span>
    <input id="speed" type="range" min="0" max="100" value="28">
    <span id="speed-label" class="mono"></span>
  </label>

  <span id="status" class="mono">loading…</span>
</div>

<p id="hint">
  <b>Click or drag on the letters</b> to wound them &mdash; they grow back.
  <span class="keys">space play/pause &middot; R reset &middot; D damage &middot; F fullscreen</span>
</p>

<script type="module" src="lecture.js"></script>
</body>
</html>
