<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Gallery of Trainable Lenia runs — learned continuous cellular automata kernels and channel couplings, fit to target patterns.">
<title>Trainable Lenia Gallery</title>
<link rel="stylesheet" href="dashboard.css">
<style>
  /* lenia-page-only additions, layered on top of dashboard.css */
  .lenia-controls { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px; font-size:0.8em; color:#ccc; }
  .lenia-controls button { padding:4px 10px; background:#444; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
  .lenia-controls button:hover { background:#555; }
  .lenia-controls input[type="range"] { vertical-align:middle; }
  #cards-container .card { width: 340px; }
  .kernel-row { display:flex; justify-content:space-between; gap:12px; margin-top:10px; }
  .kernel-row > div { width:48%; }
  .kernel-row .img-container { height:110px; }
  .target-row { margin-top:10px; }
  .target-row .img-container { height:90px; width:90px; margin:0 auto; }
  .run-desc { font-size:0.8em; color:#888; margin-top:4px; min-height:1.1em; }
  .lenia-live-toggle { margin-top:12px; }
  .lenia-live-toggle button { padding:4px 10px; background:#2d6a4f; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold; }
  .lenia-live-toggle button:hover { background:#37835f; }
  .lenia-live { margin-top:10px; padding-top:10px; border-top:1px dashed #444; }
  .live-canvas-wrap { display:inline-block; position:relative; background:#000; border:2px solid #444; border-radius:4px; }
  .lenia-live canvas { width:256px; height:256px; image-rendering:pixelated; cursor:crosshair; display:block; }
</style>
</head>
<body>

<nav class="sitenav" aria-label="Site" style="display:flex;flex-wrap:wrap;gap:1.15rem;align-items:center;padding:0.85rem 1.25rem;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;font-size:0.78rem;letter-spacing:0.02em;border-bottom:1px solid #333;color:#888;">
  <a href="index.html" style="color:#ccc;text-decoration:none;">Article</a>
  <a href="dashboard.html" style="color:#ccc;text-decoration:none;">Experiment gallery</a>
  <a href="research.html" style="color:#ccc;text-decoration:none;">Research log</a>
  <a href="lenia.html" aria-current="page" style="color:#4db8ff;text-decoration:none;font-weight:bold;">Lenia lab</a>
</nav>

<h1>Trainable Lenia Run Gallery (Live)</h1>
<p style="text-align:center;color:#888;font-size:0.85em;max-width:640px;margin:0 auto 20px auto;">
  Runs whose growth kernels and channel couplings are learned rather than
  hand-tuned, read live from the same public training bucket as the
  <a href="dashboard.html" style="color:#4db8ff;">NCA gallery</a>.
</p>

<!--
  Each card's main image row *plays back* pre-rendered COMP / KERNEL /
  COUPLING PNG snapshots that the training job's WebGL engine writes to
  the bucket, all driven by one shared timeline (scrubbing/playing COMP
  re-syncs the nearest KERNEL/COUPLING frame at or before that step).

  The "Run live" section per card is a separate, real in-browser
  simulator (lenia_engine.js / LeniaCA) that steps the run's exported
  weights.json directly, reproducing the trained physics from scratch
  rather than replaying snapshots.
-->

<!-- Filter Controls -->
<div style="text-align: center; margin-bottom: 20px;">
    <strong>Sort: </strong>
    <select id="sort-select" onchange="setSort(this.value)" style="padding: 5px 15px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
        <option value="newest">Newest first</option>
        <option value="name">Name</option>
    </select>
    <input id="search-box" type="text" placeholder="filter runs… (e.g. aniso, square, 3ch)" oninput="applyFilters()" style="margin-left: 20px; padding: 5px 12px; width: 260px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
</div>

<div id="cards-container"></div>

<div style="position:fixed; bottom:6px; right:10px; color:#555; font-size:11px;">build ?v=lenia-2</div>
<script type="module" src="lenia.js?v=lenia-2"></script>
</body>
</html>
