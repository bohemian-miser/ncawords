<!doctype html>
<html><head><meta charset="utf-8"><title>probe</title>
<style>html,body{margin:0;height:100%;overflow:hidden}iframe{border:0;width:1600px;height:900px;display:block}</style>
</head><body>
<iframe id="f" src="lecture.html"></iframe>
<script>
const log = [];
const say = (s) => { log.push(s); console.log(s); };
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function waitFor(fn, ms = 15000) {
  const t0 = Date.now();
  while (Date.now() - t0 < ms) { if (fn()) return true; await sleep(50); }
  throw new Error('timeout waiting');
}

(async () => {
  const win = document.getElementById('f').contentWindow;
  try {
    await waitFor(() => win.__lectureReady);
    const L = win.__lecture;
    say('READY engine=' + L.engineMode + ' grid=' + L.grid.join('x') + ' target=' + L.target);
    say('SPS(default 20min) = ' + L.stepsPerSecond());

    // step 1-by-1, recording a checksum of every step
    const cks = [L.checksum()];
    for (let i = 0; i < 20; i++) { L.advance(1); cks.push(L.checksum()); }
    say('after 20 steps: step=' + L.step + ' snaps=' + L.snaps + ' stride=' + L.stride +
        ' historyMB=' + (L.historyBytes / 1048576).toFixed(1));
    const rgbaGrown = L.rgbaChecksum();

    // scrub BACK to 5 -> must be an EXACT restore of the recorded step-5 state
    L.requestScrub(5);
    await waitFor(() => !L.scrubbing);
    say('scrub back to 5: step=' + L.step + ' exact=' + (L.checksum() === cks[5]));

    // scrub FORWARD to 20 -> re-simulation, stochastic, allowed to differ
    L.requestScrub(20);
    await waitFor(() => !L.scrubbing);
    const resim = L.checksum();
    say('scrub fwd to 20: step=' + L.step + ' identicalToOriginal=' + (resim === cks[20]));

    // scrub BACK to 5 again -> exact restore of the (rewritten) snapshot at 5
    // which is still the same state, since 0..5 was never re-simulated
    L.requestScrub(5);
    await waitFor(() => !L.scrubbing);
    say('scrub back to 5 again: exact=' + (L.checksum() === cks[5]));

    // scrub to 0 and back to target for the screenshot
    L.requestScrub(0);
    await waitFor(() => !L.scrubbing);
    say('scrub to 0: step=' + L.step + ' exact=' + (L.checksum() === cks[0]));

    // grow to the full target (direct: rAF frames are scarce under virtual time)
    L.advance(L.target);
    L.draw(); L.updateStatus();
    say('grown: step=' + L.step);

    // damage while paused must repaint
    const before = L.rgbaChecksum();
    L.damageRandom();
    say('damage while paused changed pixels: ' + (L.rgbaChecksum() !== before));
    L.advance(24); L.draw(); L.updateStatus();   // regeneration
    say('final: step=' + L.step + ' snaps=' + L.snaps + ' stride=' + L.stride +
        ' historyMB=' + (L.historyBytes / 1048576).toFixed(1));
    say('PROBE_OK');
  } catch (e) {
    say('PROBE_FAIL ' + (e && e.message));
  }
  const d = document.createElement('div');
  d.id = 'probe-log';
  d.textContent = log.join(' || ');
  d.style.cssText = 'position:fixed;bottom:0;left:0;color:#0f0;font:11px monospace;background:#000;z-index:99';
  document.body.appendChild(d);
})();
</script>
</body></html>
