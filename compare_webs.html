<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NCA Topology Comparison Dashboard</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #f0f0f0; margin: 0; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
    #cards-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    
    .card { background: #2a2a2a; border-radius: 8px; padding: 20px; text-align: center; width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid #444; transition: transform 0.2s; cursor: pointer; }
    .card:hover { transform: scale(1.02); border-color: #666; }
    .card h3 { margin-top: 0; font-size: 1.1em; color: #4db8ff; height: 30px; }
    .status { font-size: 0.9em; color: #888; margin-top: 15px; }

    .side-by-side { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .side-by-side > div { width: 48%; }
    .sub-desc { font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
    .img-container { width: 100%; height: 180px; display: flex; justify-content: center; align-items: center; background: #111; border-radius: 4px; overflow: hidden; }
    .img-container img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }

    /* Modal for history gallery */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; overflow-y: auto; }
    .modal-content { display: flex; flex-direction: column; align-items: center; padding: 40px; position: relative; }
    .modal-close { position: fixed; top: 20px; right: 40px; color: white; font-size: 40px; cursor: pointer; z-index: 1100; font-weight: bold; }
    .modal-close:hover { color: #ff5555; }
    .modal-gallery { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-width: 1200px; }
    .gallery-item { background: #222; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #444; }
    .gallery-item img { width: 150px; height: 150px; object-fit: contain; image-rendering: pixelated; display: block; margin-bottom: 8px; background: #000; }
    .gallery-item span { font-size: 0.85em; color: #ccc; }
</style>
</head>
<body>

<h1>NCA Generation Progress Dashboard (Live)</h1>

<!-- Interactive Widget -->
<div id="interactive-widget" style="background:#2a2a2a; border-radius:8px; padding:20px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.3); border:2px solid #4db8ff; margin: 0 auto 30px auto; max-width: 600px;">
    <h2 style="margin-top:0; color:#4db8ff;">Interactive Playground (Client-Side WebGL)</h2>
    <p style="font-size: 0.9em; color:#aaa;">Runs locally on your GPU/CPU with no backend requests.</p>
    
    <div style="margin-bottom:15px;">
        <button onclick="prevInteractiveModel()" style="padding:6px 10px; background:#444; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer;" title="Previous Model">&#9664;</button>
        <select id="interactive-model-select" style="padding:5px; background:#111; color:#fff; border:1px solid #444; border-radius:4px; margin:0 5px;">
            <!-- Options are populated dynamically on load -->
        </select>
        <button onclick="nextInteractiveModel()" style="padding:6px 10px; background:#444; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer;" title="Next Model">&#9654;</button>
        <button onclick="loadInteractiveModel()" style="padding:6px 15px; margin-left:10px; background:#4db8ff; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Load Weights</button>
        <button onclick="resetInteractive()" style="padding:6px 15px; margin-left:10px; background:#ff5555; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Reset Grid</button>
    </div>
    
    <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:15px;">
        <label>Animation Speed (Steps/tick):</label>
        <input type="range" id="speed-slider" min="1" max="25" value="1" style="width:150px;">
        <span id="speed-val">1</span>
    </div>
    
    <div style="display:inline-block; position:relative; background:#000; border: 2px solid #444; border-radius:4px;">
        <!-- Canvas for interaction tracking -->
        <canvas id="nca-canvas" width="600" height="200" onmousedown="startDamage(event)" onmousemove="doDamage(event)" onmouseup="stopDamage(event)" onmouseleave="stopDamage(event)" style="cursor:crosshair;"></canvas>
    </div>
</div>

<!-- Filter Controls -->
<div style="text-align: center; margin-bottom: 20px;">
    <strong>Filter by Seed Type: </strong>
    <select id="seed-filter" onchange="applySeedFilter()" style="padding: 5px 15px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff;">
        <option value="all">All Topologies</option>
        <option value="single">Single Central Seed Only</option>
        <option value="noise">Noise / Cloud Seed Only</option>
    </select>
</div>

<!-- Proposed Targets card is now dynamically generated via the methods array -->

<style>
@keyframes pulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}
</style>

<div id="cards-container"></div>

<!-- Modal -->
<div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
   <div class="modal-content" onclick="handleContentClick(event)">
       <span class="modal-close" onclick="closeModal()">&times;</span>
       <h2 id="modal-title" style="margin-bottom: 5px;">Method</h2>
       <p id="modal-desc" style="color: #aaa; text-align: center; max-width: 700px; margin-top: 0; margin-bottom: 20px;"></p>
       <div id="modal-notes" style="width: 80%; background:#111; padding: 15px; border-radius: 6px; margin-bottom: 20px;">
           <h3 style="margin-top:0; color:#4db8ff;">Notes & Observations</h3>
           <ul id="notes-list" style="color: #ccc; font-size: 0.95em; text-align:left; max-height:150px; overflow-y:auto; padding-left:20px;"></ul>
           <div style="display:flex; gap:10px; margin-top: 10px;">
               <input type="text" id="note-input" placeholder="Add a note (e.g. Needs more loss thresholding)..." style="flex:1; padding:8px; background:#222; color:#fff; border:1px solid #555; border-radius:4px;" onclick="event.stopPropagation()">
               <button onclick="submitNote(event)" style="padding:8px 15px; background:#4db8ff; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Post Note</button>
               <button id="btn-begin-training" onclick="beginTraining(event)" style="display:none; padding:8px 15px; background:#55ff55; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">Begin Training</button>
           </div>
       </div>
       <div class="modal-gallery" id="modal-gallery"></div>
</div>

<script>
    let methods = [];
    let cardTrackers = [];
    const container = document.getElementById('cards-container');

    let serverState = {};
    let activeModalDir = null;
    let activeModalMaxStepRendered = -100;

    // Fetch methods via API
    fetch('methods.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            methods = data;
            
            // Build cards
            methods.forEach(m => {
                container.innerHTML += `
                    <div class="card" id="card_${m.id}" onclick="openModal('${m.title}', '${m.dir}', \`${m.desc}\`)">
                        <h3>${m.title}</h3>
                        <div class="side-by-side">
                            <div>
                                <div class="sub-desc">Live Target</div>
                                <div class="img-container"><img id="live_tgt_${m.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" onerror="this.src='${m.dir}target.png'"></div>
                            </div>
                            <div>
                                <div class="sub-desc">Latest Checkpoint</div>
                                <div class="img-container"><img id="live_${m.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="></div>
                            </div>
                        </div>
                        <div class="status" id="live_status_${m.id}">Loading Server State...</div>
                    </div>
                `;
            });
            
            initializeDropdown();
            
            cardTrackers = methods.map(m => ({
                dir: m.dir, 
                cardObj: document.getElementById(`card_${m.id}`),
                imgObj: document.getElementById(`live_${m.id}`), 
                tgtObj: document.getElementById(`live_tgt_${m.id}`), 
                statusObj: document.getElementById(`live_status_${m.id}`), 
                lastKnownStep: -100 
            }));

            // Start polling once cards are built
            setInterval(fetchStatus, 1500);
            fetchStatus();
        })
        .catch(err => console.error("Could not load methods.json", err));
        
    function applySeedFilter() {
        const filterVal = document.getElementById('seed-filter').value;
        methods.forEach(m => {
            const el = document.getElementById(`card_${m.id}`);
            if (!el) return;
            if (filterVal === 'all') {
                el.style.display = 'block';
            } else if (filterVal === m.seedType) {
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        });
    }
    
    function fetchStatus() {
        fetch('status.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                serverState = data;
                updateOverviewUI();
                updateActiveModalUI();
            })
            .catch(err => {
                console.error("status.json fetch failed", err);
            });
    }
    
    function initializeDropdown() {
        const selectBox = document.getElementById("interactive-model-select");
        selectBox.innerHTML = '';
        methods.forEach(m => {
            if (m.id === 'diffusion') return;
            let opt = document.createElement('option');
            opt.value = m.dir.replace('/', '');
            opt.innerText = m.title;
            selectBox.appendChild(opt);
        });
    }
    
    function prevInteractiveModel() {
        const select = document.getElementById("interactive-model-select");
        if (select.options.length > 0) {
            select.selectedIndex = (select.selectedIndex - 1 + select.options.length) % select.options.length;
            loadInteractiveModel();
        }
    }
    
    function nextInteractiveModel() {
        const select = document.getElementById("interactive-model-select");
        if (select.options.length > 0) {
            select.selectedIndex = (select.selectedIndex + 1) % select.options.length;
            loadInteractiveModel();
        }
    }

    function updateOverviewUI() {
        cardTrackers.forEach(ct => {
            const currentHighest = serverState[ct.dir];
            if (currentHighest !== undefined) {
                if (currentHighest > ct.lastKnownStep) {
                    ct.lastKnownStep = currentHighest;
                    if (currentHighest === -1) {
                        ct.lastStatusText = "No runs logged yet (Waiting on step 0)";
                    } else {
                        ct.lastStatusText = `Latest: Step ${currentHighest} / 16000`;
                        let stepStr = String(currentHighest).padStart(5, '0');
                        if(ct.imgObj) {
                            ct.imgObj.onerror = function() { this.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='; };
                            ct.imgObj.src = `${ct.dir}COMP_${stepStr}.png?t=` + Date.now();
                        }
                        if(ct.tgtObj) ct.tgtObj.src = `${ct.dir}TARGET_${stepStr}.png?t=` + Date.now();
                    }
                }
                
                // Always update the colors based on the currentHighest
                if (!ct.cardObj || !ct.statusObj) return;
                
                if (ct.dir === 'snaps_proposed_targets/') {
                    ct.cardObj.style.borderColor = '#4db8ff';
                    ct.statusObj.style.color = '#4db8ff';
                    ct.statusObj.innerText = '(Ready for training)';
                    if (ct.imgObj) ct.imgObj.style.display = 'none';
                } else if (currentHighest >= 15900) {
                    ct.cardObj.style.borderColor = '#00ff00';
                    ct.statusObj.style.color = '#00ff00';
                    ct.statusObj.innerText = (ct.lastStatusText || '') + ' (DONE)';
                } else if (currentHighest >= 0) {
                    ct.cardObj.style.borderColor = '#ffaa00';
                    ct.statusObj.style.color = '#ffaa00';
                    ct.statusObj.innerText = (ct.lastStatusText || '') + ' (RUNNING)';
                } else {
                    ct.statusObj.innerText = (ct.lastStatusText || '');
                }
            }
        });
    }

    function openModal(title, dir, desc) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc || "No description available.";
        
        let btnBegin = document.getElementById('btn-begin-training');
        if (dir === 'snaps_proposed_targets/') {
            btnBegin.style.display = 'inline-block';
        } else {
            btnBegin.style.display = 'none';
        }
        
        const gallery = document.getElementById('modal-gallery');
        gallery.innerHTML = '';
        activeModalDir = dir;
        activeModalMaxStepRendered = -100;
        document.getElementById('modal').style.display = 'block';
        updateActiveModalUI();
        fetchNotes(dir);
    }

    function fetchNotes(dir) {
        fetch('http://localhost:8002/api/notes').then(r=>r.json()).then(data => {
            const list = document.getElementById('notes-list');
            list.innerHTML = '';
            if(data[dir]) {
                data[dir].forEach(n => {
                    let d = new Date(n.timestamp * 1000).toLocaleString();
                    list.innerHTML += `<li style="margin-bottom:5px;"><b>${d}</b>: ${n.note}</li>`;
                });
            } else {
                list.innerHTML = '<li><i>No notes yet.</i></li>';
            }
        }).catch(err => console.error(err));
    }

    function submitNote(event) {
        event.stopPropagation();
        const input = document.getElementById('note-input');
        const note = input.value.trim();
        if(!note || !activeModalDir) return;
        postNote(note, () => {
            input.value = '';
            fetchNotes(activeModalDir);
        });
    }

    function beginTraining(event) {
        event.stopPropagation();
        if(!activeModalDir) return;
        postNote("[SYSTEM: BEGIN TRAINING]", () => {
            fetchNotes(activeModalDir);
            document.getElementById('live_status_proposed_targets').innerText = "Training Started!";
            document.getElementById('live_status_proposed_targets').style.animation = "none";
            document.getElementById('live_status_proposed_targets').style.color = "#55ff55";
        });
    }

    function postNote(noteContent, callback) {
        fetch('http://localhost:8002/api/notes', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({dir: activeModalDir, note: noteContent})
        }).then(r=>r.json()).then(data => callback());
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        activeModalDir = null;
    }
    
    // Allow clicking the overlay background to close the modal
    function handleOverlayClick(event) {
        closeModal();
    }
    
    // Detect where the user clicked inside the modal content layer
    function handleContentClick(event) {
        if (event.target.closest('#modal-notes') || event.target.closest('.gallery-item')) {
            // Keep modal open if clicking inside the notes or a specific step
            event.stopPropagation();
        } else {
            // Close the modal for unstructured background clicks
            closeModal();
            event.stopPropagation();
        }
    }

    function updateActiveModalUI() {
        if (!activeModalDir) return;
        const maxStep = serverState[activeModalDir];
        if (maxStep !== undefined && maxStep > activeModalMaxStepRendered) {
            const gallery = document.getElementById('modal-gallery');
            let start = Math.max(0, activeModalMaxStepRendered + 100);
            if (activeModalMaxStepRendered === -100) start = 0;
            
            for (let s = start; s <= maxStep; s += 100) {
                let stepStr = String(s).padStart(5, '0');
                let compImgHtml = `<img src="${activeModalDir}COMP_${stepStr}.png" onerror="this.style.display='none'" alt="Step ${s}">`;
                
                gallery.innerHTML += `
                    <div class="gallery-item">
                        <img src="${activeModalDir}TARGET_${stepStr}.png" onerror="this.src='${activeModalDir}target.png'; this.onerror=null;" alt="Target Step ${s}">
                        ${compImgHtml}
                        <span>Step ${s}</span>
                    </div>
                `;
            }
            activeModalMaxStepRendered = maxStep;
        }
    }

</script>
<script type="module">
    import { createCA } from './docs/nca.js';

    // INTERACTIVE WIDGET LOGIC (Client-Side WebGL)
    const canvas = document.getElementById("nca-canvas");
    const ctx = canvas.getContext("2d");
    
    // Default config matching original
    window.interactiveLoop = null;
    window.isDamaging = false;
    let lastDamageTime = 0;
    let unit = null; // Holds the instantiated CA

    // Event listener for the speed slider
    document.getElementById("speed-slider").oninput = function() {
        document.getElementById("speed-val").innerText = this.value;
    };

    window.loadInteractiveModel = async function() {
        if(window.interactiveLoop) clearTimeout(window.interactiveLoop);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#888";
        ctx.font = "16px sans-serif";
        ctx.fillText("Loading weights...", canvas.width/2 - 50, canvas.height/2);
        
        let dir = document.getElementById("interactive-model-select").value;
        let isNoise = dir.endsWith("_noise");
        
        // Map python folder names to JSON exports
        let baseJson = dir.replace('snaps_web_', 'word_').replace('snaps_', 'word_');
        if(baseJson === 'word_cloud') baseJson = 'word_cloud';
        
        let jsonName = baseJson + '.json';
        let fallbackJsonName = baseJson.replace('_noise', '') + '.json';
        
        try {
            let res = await fetch(`docs/weights/${jsonName}`);
            
            // If the specific _noise model wasn't exported, fallback to the base model weights
            if(!res.ok && isNoise) {
                res = await fetch(`docs/weights/${fallbackJsonName}`);
                if(!res.ok) throw new Error(`Could not load docs/weights/${fallbackJsonName}`);
            } else if (!res.ok) {
                throw new Error(`Could not load docs/weights/${jsonName}`);
            }
            
            const weights = await res.json();
            
            // Clean up old webgl context if present
            if(unit && unit.ca && unit.ca.gl) {
                const ext = unit.ca.gl.getExtension('WEBGL_lose_context');
                if(ext) ext.loseContext();
            }
            
            const { ca, mode } = createCA(weights);
            unit = { ca, mode, isNoise };
            
            let cw = typeof ca.width === 'number' ? ca.width : (weights.grid_w ?? weights.grid);
            let ch = typeof ca.height === 'number' ? ca.height : (weights.grid_h ?? weights.grid);
            unit.w = cw;
            unit.h = ch;
            unit.imgData = ctx.createImageData(cw, ch);
            
            // Set canvas visual size. Actual resolution is cw, ch.
            canvas.width = cw;
            canvas.height = ch;
            canvas.style.width = (cw * 4) + 'px'; // upscale for UI
            canvas.style.imageRendering = 'pixelated';
            
            ca.reset(isNoise);
            drawCA();
            window.runInteractiveLoop();
        } catch(e) {
            console.error(e);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff5555";
            ctx.fillText("Model load failed. Please ensure JSON weights exist.", 10, 20);
        }
    };
    
    function drawCA() {
        if(!unit || !unit.ca) return;
        if (unit.mode === 'gl' && typeof unit.ca.drawTo === 'function') {
            unit.ca.drawTo(ctx);
        } else {
            const out = unit.ca.readRGBA(unit.imgData.data);
            if (out && out !== unit.imgData.data) unit.imgData.data.set(out);
            ctx.putImageData(unit.imgData, 0, 0);
        }
    }

    window.resetInteractive = function() {
        if(unit && unit.ca) {
            unit.ca.reset(unit.isNoise);
            drawCA();
        }
    };

    window.runInteractiveLoop = function() {
        if(!unit || !unit.ca) return;
        const steps = parseInt(document.getElementById("speed-slider").value);
        for(let i=0; i<steps; i++) unit.ca.step();
        drawCA();
        window.interactiveLoop = setTimeout(window.runInteractiveLoop, 30);
    };

    window.sendDamage = function(e) {
        if(!unit || !unit.ca) return;
        const now = Date.now();
        if (now - lastDamageTime < 10) return; // Client-side can be fast
        lastDamageTime = now;
        
        const rect = canvas.getBoundingClientRect();
        // Calculate normalized coordinate across the upscaled CSS display
        const normX = (e.clientX - rect.left) / rect.width;
        const normY = (e.clientY - rect.top) / rect.height;
        
        // Damage CA using absolute grid coordinates
        unit.ca.damage(normX * unit.w, normY * unit.h, 6); // R=6
        drawCA();
    };
    
    window.startDamage = function(e) { window.isDamaging = true; window.sendDamage(e); };
    window.stopDamage = function(e) { window.isDamaging = false; };
    window.doDamage = function(e) { if(window.isDamaging) window.sendDamage(e); };

</script>

</body>
</html>
